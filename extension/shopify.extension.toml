# Customer-account UI extension: the "Rechnung" card on the order detail page.
#
# This file replaces the one generated by `shopify app generate extension`.
# Keep the same `name`/`handle` Shopify assigned, or update them to match.

api_version = "2025-07"

[[extensions]]
type   = "ui_extension"
name   = "Rechnung"
handle = "rechnung-block"

  # Allows the extension to fetch() our backend proxy.
  # NOTE: for the LIVE store you must also request network access approval in
  # the Partner Dashboard (App → Extensions → request access).
  [extensions.capabilities]
  network_access = true

  [[extensions.targeting]]
  # Renders as a merchant-placeable block on the order detail / status page.
  module = "./src/RechnungBlock.tsx"
  target = "customer-account.order-status.block.render"
